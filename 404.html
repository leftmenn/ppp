<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — 404</title>
    <style>
        body {
            background-color: rgb(143, 5, 255);
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .error-container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 120px;
            margin: 0;
            font-weight: 800;
            letter-spacing: 4px;
            opacity: 0.9;
        }

        p {
            font-size: 24px;
            line-height: 1.5;
            margin-top: 10px;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            color: rgb(143, 5, 255);
            background-color: #ffffff;
            text-decoration: none;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1>404</h1>
        <p>К сожалению, мы не нашли текущую страницу, но она совсем скоро появится!!</p>
        <a href="index.html" class="back-btn">Вернуться на главную</a>
    </div>

</body>
</html>
