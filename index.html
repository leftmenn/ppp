<!DOCTYPE html>
<html lang="ru">
<head>

    <title>Сайт о калькуляторах 2026</title>
    <style>
        body {
            background: #72a3b4 url('467092_a8e50_th.jpg') no-repeat left center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .right-panel {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 450px;
            display: flex;
            flex-direction: column; 
            gap: 20px; 
            z-index: 1000;
        }

        .top-nav {
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            flex: 1;
            text-align: center;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
            color: #333333;
            text-decoration: none;
            background-color: rgba(255, 255, 255, 0.85);
            border: 2px solid transparent;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .nav-btn:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            color: #000000;
        }

        .nav-btn.buy-btn {
            background-color: #2b5767;
            color: #ffffff;
        }

        .nav-btn.buy-btn:hover {
            background-color: #1e3d49;
            color: #ffffff;
        }

        .video-container {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 6px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

</nav>
